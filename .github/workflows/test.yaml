name: Test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: uv sync
      - name: Pre-commit
        run: |
          uv run pre-commit run -a
      - name: Type checking
        run: uv run ty check
  test:
    name: Tests
    env:
      UV_HTTP_TIMEOUT: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies and run tests
        run: |
          uv sync --all-groups
          uv run pytest --tb=short --no-cov --disable-warnings
