name: Release

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    environment: prod
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --head release --state open --json number --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "::error::There is an open PR from the 'release' branch. Merge or close it before releasing."
            exit 1
          fi
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Install semantic-release plugins
        run: >-
          npm install semantic-release @semantic-release/changelog
          @semantic-release/exec
      - name: Create prerelease branch
        if: github.event_name != 'workflow_dispatch'
        run: git push --force origin HEAD:refs/heads/prerelease
      - name: Prerelease
        if: github.event_name != 'workflow_dispatch'
        run: |
          mv .releaserc.prerelease.yaml .releaserc.yaml
          npx semantic-release
      - name: Release
        if: github.event_name == 'workflow_dispatch'
        run: npx semantic-release
      - name: Create PR with release artifacts
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore(release): update version and changelog [skip ci]"
          git push --force origin release
          gh pr create \
            --base main \
            --head release \
            --title "chore(release): merge release changes back to main" \
            --body "Automated PR to sync version bump and changelog from release."
      - name: Clean up prerelease branch
        if: always() && github.event_name != 'workflow_dispatch'
        run: git push origin --delete prerelease || true
